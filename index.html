<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Education Network | Oxford Representative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oxford: #002147; --dark-red: #B22222; }
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-oxford { background-color: var(--oxford); }
        .text-oxford { color: var(--oxford); }
        .bg-red-dark { background-color: var(--dark-red); }
        .slider-text { background: rgba(0, 33, 71, 0.4); backdrop-filter: blur(5px); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-white">

    <header class="fixed w-full z-50 bg-white shadow-sm py-4 px-8 flex justify-between items-center">
        <div class="flex items-center gap-10">
            <div class="text-2xl font-bold text-oxford tracking-tighter italic">GEN LOGO</div>
            <nav class="hidden xl:flex gap-6 text-[11px] font-bold uppercase tracking-widest text-gray-600">
                <a href="#" class="hover:text-red-700 transition">მთავარი</a>
                <a href="#news" class="hover:text-red-700 transition">სიახლეები</a>
                <a href="#programs" class="hover:text-red-700 transition">პროგრამები</a>
                <a href="#courses" class="hover:text-red-700 transition">კურსები</a>
                <a href="#admission" class="hover:text-red-700 transition">ჩაბარება</a>
                <a href="#about" class="hover:text-red-700 transition">ჩვენ შესახებ</a>
                <a href="#gallery" class="hover:text-red-700 transition">გალერეა</a>
            </nav>
        </div>
        <div class="flex items-center gap-6">
            <button class="text-sm font-bold text-oxford border-b-2 border-red-700">GE</button>
            <button class="text-sm font-bold text-gray-400 hover:text-oxford transition">EN</button>
            <div class="relative cursor-pointer group">
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-dark text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-oxford" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
            </div>
        </div>
    </header>

    <section class="relative h-[90vh] bg-oxford overflow-hidden">
        <div id="main-slider" class="h-full flex transition-transform duration-1000 ease-in-out">
            <div class="min-w-full h-full bg-cover bg-center flex items-center justify-center" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://drive.google.com/uc?export=view&id=1rfocCbkDUJaPCaCmFZd8lUzdtlgnuPxq')">
                <div class="text-center text-white px-4 slider-text p-10 rounded-lg">
                    <h1 class="serif text-4xl md:text-6xl mb-4">გლობალური განათლების ქსელი</h1>
                    <p class="text-lg md:text-xl font-light tracking-wide uppercase">ოქსფორდის პირველი და ერთადერთი ოფიციალური წარმომადგენელი საქართველოში</p>
                </div>
            </div>
        </div>
    </section>

    <section id="admission" class="py-24 bg-gray-50 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-16">
                <h2 class="serif text-4xl text-oxford mb-2">საუნივერსიტეტო მომსახურება</h2>
                <p class="text-gray-500 uppercase text-xs tracking-widest italic">აირჩიეთ თავისუფალი კონსულტანტი</p>
            </div>
            <div class="grid md:grid-cols-3 gap-10" id="consultant-list">
                <div id="card-1" class="bg-white p-10 shadow-xl border-t-4 border-oxford rounded-b-xl text-center transition-all duration-700">
                    <div class="flex justify-center items-center gap-2 mb-6">
                        <span id="dot-1" class="w-3 h-3 bg-green-500 rounded-full status-pulse"></span>
                        <span id="text-1" class="text-[10px] font-bold uppercase tracking-widest text-green-600">Available</span>
                    </div>
                    <h3 class="serif text-2xl text-oxford mb-8">კონსულტანტი #1</h3>
                    <button id="btn-1" onclick="openContactForm('კონსულტანტი 1')" class="bg-red-dark text-white px-8 py-3 rounded-md hover:bg-red-800 transition tracking-widest text-xs font-bold uppercase">Request a Call</button>
                </div>
                </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { /* ჩასვით თქვენი მონაცემები */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // REAL-TIME STATUS SYNC
        onValue(ref(db, 'consultants'), (snapshot) => {
            const data = snapshot.val();
            [1,2,3].forEach(num => {
                const isAvail = data[`cons${num}`]?.available;
                const card = document.getElementById(`card-${num}`);
                const btn = document.getElementById(`btn-${num}`);
                if(!isAvail) {
                    card.classList.add('opacity-40', 'grayscale');
                    btn.disabled = true;
                    btn.innerText = "No Slots";
                    document.getElementById(`text-${num}`).innerText = "Busy";
                    document.getElementById(`dot-${num}`).classList.replace('bg-green-500', 'bg-gray-400');
                } else {
                    card.classList.remove('opacity-40', 'grayscale');
                    btn.disabled = false;
                    btn.innerText = "Request a Call";
                }
            });
        });
    </script>
</body>
</html>
