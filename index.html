<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Education Network | Oxford Representative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oxford: #002147; --dark-red: #B22222; }
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-oxford { background-color: var(--oxford); }
        .text-oxford { color: var(--oxford); }
        .bg-red-dark { background-color: var(--dark-red); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-white">

    <header class="fixed w-full z-50 bg-white shadow-sm py-4 px-8 flex justify-between items-center">
        <div class="flex items-center gap-10">
            <div class="text-2xl font-bold text-oxford tracking-tighter italic uppercase">GEN</div>
            <nav class="hidden xl:flex gap-6 text-[11px] font-bold uppercase tracking-widest text-gray-600">
                <a href="#" class="hover:text-red-700 transition">მთავარი</a>
                <a href="#news" class="hover:text-red-700 transition">სიახლეები</a>
                <a href="#programs" class="hover:text-red-700 transition">პროგრამები</a>
                <a href="#courses" class="hover:text-red-700 transition">კურსები</a>
                <a href="#admission" class="hover:text-red-700 transition">ჩაბარება</a>
                <a href="#about" class="hover:text-red-700 transition">ჩვენ შესახებ</a>
            </nav>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer">
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-dark text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-oxford" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
            </div>
        </div>
    </header>

    <section class="relative h-[80vh] bg-oxford flex items-center justify-center bg-cover bg-center" style="background-image: linear-gradient(rgba(0,33,71,0.6), rgba(0,33,71,0.6)), url('https://drive.google.com/uc?export=view&id=1rfocCbkDUJaPCaCmFZd8lUzdtlgnuPxq')">
        <div class="text-center text-white p-10">
            <h1 class="serif text-5xl md:text-7xl mb-4 uppercase">გლობალური განათლების ქსელი</h1>
            <p class="text-lg md:text-xl font-light tracking-widest uppercase border-t border-b py-2 inline-block">ოქსფორდის პირველი და ერთადერთი ოფიციალური წარმომადგენელი საქართველოში</p>
        </div>
    </section>

    <section id="admission" class="py-24 bg-gray-50 px-6">
        <div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-10">
            <div id="card-cons1" class="bg-white p-10 shadow-lg rounded-xl text-center transition-all duration-500 border-t-4 border-oxford">
                <div class="flex justify-center items-center gap-2 mb-4">
                    <span id="dot-cons1" class="w-3 h-3 bg-green-500 rounded-full status-pulse"></span>
                    <span id="status-cons1" class="text-[10px] font-bold uppercase">Available</span>
                </div>
                <h3 class="serif text-2xl text-oxford mb-6 uppercase">კონსულტანტი #1</h3>
                <button id="btn-cons1" class="bg-red-dark text-white px-6 py-2 rounded uppercase text-xs font-bold tracking-widest">Request a Call</button>
            </div>
            <div id="card-cons2" class="bg-white p-10 shadow-lg rounded-xl text-center transition-all duration-500 border-t-4 border-oxford">
                <div class="flex justify-center items-center gap-2 mb-4">
                    <span id="dot-cons2" class="w-3 h-3 bg-green-500 rounded-full status-pulse"></span>
                    <span id="status-cons2" class="text-[10px] font-bold uppercase">Available</span>
                </div>
                <h3 class="serif text-2xl text-oxford mb-6 uppercase">კონსულტანტი #2</h3>
                <button id="btn-cons2" class="bg-red-dark text-white px-6 py-2 rounded uppercase text-xs font-bold tracking-widest">Request a Call</button>
            </div>
            <div id="card-cons3" class="bg-white p-10 shadow-lg rounded-xl text-center transition-all duration-500 border-t-4 border-oxford">
                <div class="flex justify-center items-center gap-2 mb-4">
                    <span id="dot-cons3" class="w-3 h-3 bg-green-500 rounded-full status-pulse"></span>
                    <span id="status-cons3" class="text-[10px] font-bold uppercase">Available</span>
                </div>
                <h3 class="serif text-2xl text-oxford mb-6 uppercase">კონსულტანტი #3</h3>
                <button id="btn-cons3" class="bg-red-dark text-white px-6 py-2 rounded uppercase text-xs font-bold tracking-widest">Request a Call</button>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAU9dbD_iaYSzUhe9uE3XGXR0aDobWIwQ0",
            authDomain: "global-education-network-8fa82.firebaseapp.com",
            projectId: "global-education-network-8fa82",
            storageBucket: "global-education-network-8fa82.firebasestorage.app",
            messagingSenderId: "103555817398",
            appId: "1:103555817398:web:3d3480ac38b87a867d2b17"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'consultants'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                const isAvail = data[id].available;
                const card = document.getElementById(`card-${id}`);
                const btn = document.getElementById(`btn-${id}`);
                const dot = document.getElementById(`dot-${id}`);
                const statusText = document.getElementById(`status-${id}`);

                if(!isAvail) {
                    card.classList.add('opacity-40', 'grayscale');
                    btn.disabled = true;
                    btn.innerText = "No Slots";
                    statusText.innerText = "Busy";
                    dot.classList.replace('bg-green-500', 'bg-gray-400');
                } else {
                    card.classList.remove('opacity-40', 'grayscale');
                    btn.disabled = false;
                    btn.innerText = "Request a Call";
                    statusText.innerText = "Available";
                    dot.classList.replace('bg-gray-400', 'bg-green-500');
                }
            });
        });
    </script>
</body>
</html>
