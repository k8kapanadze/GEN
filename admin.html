<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>GEN Admin | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold border-b border-slate-700 pb-4 mb-10 italic uppercase tracking-tighter">GEN - Admin Dashboard</h1>

        <div class="grid md:grid-cols-2 gap-10">
            <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl">
                <h2 class="text-xl font-semibold mb-6 uppercase text-blue-400 tracking-widest">Consultant Status</h2>
                <div id="controls" class="space-y-4">
                    </div>
            </div>

            <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl text-center">
                <h2 class="text-xl font-semibold mb-6 uppercase text-red-500 tracking-widest">Upload Images</h2>
                <input type="file" id="file" class="hidden">
                <label for="file" class="block bg-slate-700 p-4 rounded-xl cursor-pointer border border-dashed border-slate-500 hover:bg-slate-600 transition mb-4 uppercase text-xs">Choose File</label>
                <button onclick="uploadFile()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition uppercase tracking-widest text-xs">Upload to Firebase</button>
                <p id="up-status" class="mt-4 text-xs italic text-slate-400"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAU9dbD_iaYSzUhe9uE3XGXR0aDobWIwQ0",
            authDomain: "global-education-network-8fa82.firebaseapp.com",
            projectId: "global-education-network-8fa82",
            storageBucket: "global-education-network-8fa82.firebasestorage.app",
            messagingSenderId: "103555817398",
            appId: "1:103555817398:web:3d3480ac38b87a867d2b17"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // სტატუსის შეცვლა
        window.toggle = (id, current) => {
            set(ref(db, 'consultants/' + id), { available: !current });
        };

        onValue(ref(db, 'consultants'), (snapshot) => {
            const data = snapshot.val();
            const box = document.getElementById('controls');
            box.innerHTML = '';
            for(let id in data) {
                const val = data[id].available;
                box.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-700 p-4 rounded-xl">
                        <span class="font-bold uppercase text-xs tracking-widest">${id}</span>
                        <button onclick="toggle('${id}', ${val})" class="px-4 py-2 rounded-lg text-[10px] font-bold uppercase ${val ? 'bg-green-600' : 'bg-red-600'}">
                            ${val ? 'Active' : 'Busy'}
                        </button>
                    </div>
                `;
            }
        });

        // ატვირთვა
        window.uploadFile = async () => {
            const file = document.getElementById('file').files[0];
            const status = document.getElementById('up-status');
            if(!file) return alert("Select a file first!");
            status.innerText = "Uploading...";
            
            const storageRef = sRef(storage, 'gallery/' + file.name);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            status.innerHTML = `Success! <br> <input class="bg-slate-900 p-2 mt-2 w-full text-[10px]" value="${url}" readonly>`;
        };
    </script>
</body>
</html>
