<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>GEN Admin | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="border-b border-slate-700 pb-6 mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold tracking-tight">GEN Admin Field</h1>
                <p class="text-slate-400 mt-2">საიტის მართვის პანელი</p>
            </div>
            <div class="text-right text-xs text-slate-500 uppercase tracking-widest">Global Education Network</div>
        </header>

        <div class="grid md:grid-cols-2 gap-10">
            <section class="bg-slate-800 p-8 rounded-2xl shadow-2xl">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> კონსულტანტების მართვა
                </h2>
                <div id="admin-controls" class="space-y-4">
                    </div>
            </section>

            <section class="bg-slate-800 p-8 rounded-2xl shadow-2xl">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-500 rounded-full"></span> ფოტოების ატვირთვა
                </h2>
                <div class="space-y-6">
                    <div class="border-2 border-dashed border-slate-600 p-6 rounded-xl text-center">
                        <input type="file" id="file-input" class="hidden">
                        <label for="file-input" class="cursor-pointer text-blue-400 hover:text-blue-300 transition">აირჩიეთ ფაილი ასატვირთად</label>
                    </div>
                    <button onclick="uploadToFirebase()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">ატვირთვა Storage-ში</button>
                    <div id="upload-status" class="text-sm text-slate-400 italic"></div>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

        const firebaseConfig = { /* ჩასვით თქვენი მონაცემები */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // TOGGLE LOGIC
        window.toggleStatus = (id, current) => {
            set(ref(db, 'consultants/' + id), { available: !current });
        };

        onValue(ref(db, 'consultants'), (snapshot) => {
            const data = snapshot.val();
            const box = document.getElementById('admin-controls');
            box.innerHTML = '';
            for(let id in data) {
                const val = data[id].available;
                box.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                        <span class="font-bold tracking-widest uppercase text-xs">${id}</span>
                        <button onclick="toggleStatus('${id}', ${val})" class="px-4 py-2 rounded-lg text-xs font-bold ${val ? 'bg-green-600 text-white' : 'bg-red-600 text-white'} uppercase">
                            ${val ? 'Active' : 'Busy'}
                        </button>
                    </div>
                `;
            }
        });

        // UPLOAD LOGIC
        window.uploadToFirebase = async () => {
            const file = document.getElementById('file-input').files[0];
            if(!file) return alert("აირჩიეთ ფაილი!");
            const status = document.getElementById('upload-status');
            status.innerText = "იტვირთება...";
            
            const storageRef = sRef(storage, 'uploads/' + file.name);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            
            status.innerHTML = `ატვირთულია! <br> <a href="${url}" target="_blank" class="text-blue-400 underline break-all">${url}</a>`;
        };
    </script>
</body>
</html>
